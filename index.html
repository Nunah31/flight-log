const { useState, useEffect, useCallback } = React;

const SHEET_ID = "1Tb6gfUgZm3VdRN2L0ZlZd0zwhnxQDHX95khHC8sjXtE";
const DURATION_OPTIONS = [10, 20, 30, 40, 60];
const AIRPORTS = ["עין ורד", "נען", "עין יהב", "אחר - הזן ידנית"];

function formatDate(d) {
  if (!d) return "";
  // Handle Google Sheets date format like "24T21:00:00.000Z/05/2026"
  if (typeof d === "string" && d.includes("T")) {
    try {
      const date = new Date(d);
      if (!isNaN(date)) {
        const day = String(date.getDate()).padStart(2,"0");
        const month = String(date.getMonth()+1).padStart(2,"0");
        const year = date.getFullYear();
        return `${day}/${month}/${year}`;
      }
    } catch(e) {}
  }
  // Handle YYYY-MM-DD
  if (typeof d === "string" && d.includes("-")) {
    const parts = d.split("-");
    if (parts.length === 3) return `${parts[2]}/${parts[1]}/${parts[0]}`;
  }
  // Handle Date object or serial number from Sheets
  try {
    const date = new Date(d);
    if (!isNaN(date)) {
      const day = String(date.getDate()).padStart(2,"0");
      const month = String(date.getMonth()+1).padStart(2,"0");
      const year = date.getFullYear();
      return `${day}/${month}/${year}`;
    }
  } catch(e) {}
  return String(d);
}

function formatTime(t) {
  if (!t) return "";
  // Handle Google Sheets time format like "1899-12-30T16:09:20.000Z"
  if (typeof t === "string" && t.includes("T")) {
    try {
      const date = new Date(t);
      if (!isNaN(date)) {
        const hours = String(date.getUTCHours()).padStart(2,"0");
        const mins = String(date.getUTCMinutes()).padStart(2,"0");
        return `${hours}:${mins}`;
      }
    } catch(e) {}
  }
  return String(t);
}

function todayISO() {
  return new Date().toISOString().split("T")[0];
}

const emptyFlight = () => ({
  date: todayISO(),
  origin: "עין ורד",
  originCustom: "",
  departureTime: "",
  duration: "",
  durationCustom: "",
  flightType: "מסחרית",
  notes: "",
});

// APPS_SCRIPT_URL יוחלף עם ה-URL האמיתי אחרי הפריסה
const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzZ065m8442-KmY7xS-XaCbyN_FLMOvFrMHQf4QNyOJePQ_idY7u7BpIXw8XnFnv9ld/exec";

async function loadFlightsFromSheet() {
  const res = await fetch(APPS_SCRIPT_URL, { method: "GET" });
  const data = await res.json();
  if (data.error) throw new Error(data.error);
  return data.rows || [];
}

async function appendFlightToSheet(record) {
  const res = await fetch(APPS_SCRIPT_URL, {
    method: "POST",
    body: JSON.stringify({ action: "append", row: record }),
  });
  return await res.json();
}

async function updateFlightInSheet(rowIndex, record) {
  const res = await fetch(APPS_SCRIPT_URL, {
    method: "POST",
    body: JSON.stringify({ action: "update", rowIndex, row: record }),
  });
  return await res.json();
}

async function deleteFlightFromSheet(rowIndex) {
  const res = await fetch(APPS_SCRIPT_URL, {
    method: "POST",
    body: JSON.stringify({ action: "delete", rowIndex }),
  });
  return await res.json();
}

const inputStyle = {
  width: "100%", background: "rgba(255,255,255,0.06)",
  border: "1px solid rgba(100,160,255,0.2)", borderRadius: 9,
  color: "#e8f4ff", fontSize: 14, padding: "9px 12px",
  outline: "none", boxSizing: "border-box",
};

const tdStyle = {
  padding: "11px 14px", textAlign: "right", verticalAlign: "middle", color: "#c8dff5", fontSize: 14,
};

function Field({ label, children }) {
  return (
    <div>
      <label style={{ display: "block", fontSize: 12, fontWeight: 600, color: "#5a88bb", marginBottom: 6 }}>{label}</label>
      {children}
    </div>
  );
}

function App() {
  const [flights, setFlights] = useState([]);
  const [loading, setLoading] = useState(false);
  const [saving, setSaving] = useState(false);
  const [form, setForm] = useState(emptyFlight());
  const [editIndex, setEditIndex] = useState(null);
  const [showForm, setShowForm] = useState(false);
  const [toast, setToast] = useState(null);
  const [deleteConfirm, setDeleteConfirm] = useState(null);
  const [sortField, setSortField] = useState("תאריך");
  const [sortDir, setSortDir] = useState("desc");

  const showToast = (msg, type = "success") => {
    setToast({ msg, type });
    setTimeout(() => setToast(null), 3000);
  };

  const loadFlights = useCallback(async () => {
    setLoading(true);
    try {
      const rows = await loadFlightsFromSheet();
      setFlights(rows);
    } catch {
      showToast("שגיאה בטעינת נתונים מהדרייב", "error");
    }
    setLoading(false);
  }, []);

  useEffect(() => { loadFlights(); }, [loadFlights]);

  function handleChange(field, value) {
    setForm(f => ({ ...f, [field]: value }));
  }

  function getOriginValue() {
    return form.origin === "אחר - הזן ידנית" ? form.originCustom : form.origin;
  }

  function getDurationValue() {
    return form.duration === "custom"
      ? (form.durationCustom ? `${form.durationCustom} דקות` : "")
      : (form.duration ? `${form.duration} דקות` : "");
  }

  function validateForm() {
    if (!form.date) return "יש להזין תאריך";
    if (!form.origin) return "יש לבחור מקום המראה";
    if (form.origin === "אחר - הזן ידנית" && !form.originCustom) return "יש להזין מקום המראה";
    if (!form.departureTime) return "יש להזין שעת המראה";
    if (!form.duration) return "יש לבחור זמן טיסה";
    if (form.duration === "custom" && !form.durationCustom) return "יש להזין זמן טיסה";
    return null;
  }

  async function handleSubmit() {
    const err = validateForm();
    if (err) { showToast(err, "error"); return; }
    const record = {
      "תאריך": form.date,
      "מקום המראה": getOriginValue(),
      "שעת המראה": form.departureTime,
      "זמן טיסה": getDurationValue(),
      "סוג טיסה": form.flightType,
      "הערות": form.notes,
    };
    setSaving(true);
    try {
      if (editIndex !== null) {
        const res = await updateFlightInSheet(editIndex, record);
        if (res.error) throw new Error(res.error);
        const updated = [...flights];
        updated[editIndex] = record;
        setFlights(updated);
        showToast("הטיסה עודכנה בהצלחה ✓");
        setEditIndex(null);
      } else {
        const res = await appendFlightToSheet(record);
        if (res.error) throw new Error(res.error);
        setFlights(fs => [...fs, record]);
        showToast("הטיסה נשמרה לדרייב ✓");
      }
      setForm(emptyFlight());
      setShowForm(false);
    } catch (e) {
      showToast("שגיאה בשמירה: " + e.message, "error");
    }
    setSaving(false);
  }

  function handleEdit(flight, index) {
    const isKnownOrigin = AIRPORTS.includes(flight["מקום המראה"]);
    const durationNum = parseInt(flight["זמן טיסה"]);
    const isKnownDur = DURATION_OPTIONS.includes(durationNum);
    setForm({
      date: flight["תאריך"],
      origin: isKnownOrigin ? flight["מקום המראה"] : "אחר - הזן ידנית",
      originCustom: isKnownOrigin ? "" : flight["מקום המראה"],
      departureTime: flight["שעת המראה"],
      duration: isKnownDur ? String(durationNum) : "custom",
      durationCustom: isKnownDur ? "" : String(durationNum),
      flightType: flight["סוג טיסה"] || "פרטית",
      notes: flight["הערות"] || "",
    });
    setEditIndex(index);
    setShowForm(true);
    window.scrollTo({ top: 0, behavior: "smooth" });
  }

  async function handleDelete(index) {
    setSaving(true);
    try {
      const res = await deleteFlightFromSheet(index);
      if (res.error) throw new Error(res.error);
      setFlights(fs => fs.filter((_, i) => i !== index));
      showToast("הטיסה נמחקה");
    } catch {
      showToast("שגיאה במחיקה", "error");
    }
    setDeleteConfirm(null);
    setSaving(false);
  }

  function handleSort(field) {
    if (sortField === field) setSortDir(d => d === "asc" ? "desc" : "asc");
    else { setSortField(field); setSortDir("asc"); }
  }

  const sorted = [...flights].sort((a, b) => {
    let va = a[sortField] || "", vb = b[sortField] || "";
    if (sortField === "זמן טיסה") { va = parseInt(va) || 0; vb = parseInt(vb) || 0; }
    if (va < vb) return sortDir === "asc" ? -1 : 1;
    if (va > vb) return sortDir === "asc" ? 1 : -1;
    return 0;
  });

  function exportToExcel() {
    if (flights.length === 0) { showToast("אין טיסות לייצוא", "error"); return; }
    const data = sorted.map((f, i) => ({ "#": i + 1, ...f }));
    const ws = XLSX.utils.json_to_sheet(data);
    ws["!cols"] = [{ wch: 4 }, { wch: 12 }, { wch: 18 }, { wch: 12 }, { wch: 12 }, { wch: 14 }, { wch: 30 }];
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, "יומן טיסות");
    XLSX.writeFile(wb, `יומן_טיסות_${new Date().toLocaleDateString("he-IL").replace(/\//g, "-")}.xlsx`);
    showToast("הקובץ יוצא בהצלחה ✓");
  }

  const SortIcon = ({ field }) => {
    if (sortField !== field) return <span style={{ opacity: 0.3, fontSize: 10 }}>↕</span>;
    return <span style={{ fontSize: 10 }}>{sortDir === "asc" ? "↑" : "↓"}</span>;
  };

  return (
    <div dir="rtl" style={{ minHeight: "100vh", background: "linear-gradient(135deg, #0a0e1a 0%, #0d1b2e 50%, #0a0e1a 100%)", fontFamily: "'Segoe UI', 'Arial Hebrew', Arial, sans-serif", color: "#e8f4ff", padding: "0 0 60px 0" }}>

          <div>
            <div style={{ fontSize: 17, fontWeight: 700, color: "#fff" }}>יומן טיסות — אודי הברי</div>
            <div style={{ fontSize: 11, color: "#7ab8ff", marginTop: 1 }}>{loading ? "טוען..." : `${flights.length} טיסות מתועדות`}</div>
          </div>
        </div>
        <div style={{ display: "flex", gap: 7, flexWrap: "wrap" }}>
          <button onClick={loadFlights} disabled={loading} style={{ background: "rgba(255,255,255,0.06)", color: "#7ab8ff", border: "1px solid rgba(100,160,255,0.2)", borderRadius: 8, padding: "7px 13px", cursor: "pointer", fontWeight: 600, fontSize: 12 }}>🔄</button>
          <button onClick={exportToExcel} style={{ background: "linear-gradient(135deg, #1a7a3a, #0e5a28)", color: "#90ffb0", border: "none", borderRadius: 8, padding: "7px 13px", cursor: "pointer", fontWeight: 600, fontSize: 12 }}>📊 אקסל</button>
          <button onClick={() => { setShowForm(!showForm); setEditIndex(null); setForm(emptyFlight()); }} style={{ background: showForm ? "rgba(255,80,80,0.15)" : "linear-gradient(135deg, #1a6aff, #0a3aaa)", color: showForm ? "#ff9090" : "#fff", border: showForm ? "1px solid rgba(255,100,100,0.3)" : "none", borderRadius: 8, padding: "7px 14px", cursor: "pointer", fontWeight: 700, fontSize: 13 }}>{showForm ? "✕ סגור" : "+ הוסף"}</button>
        </div>
      </div>

      <div style={{ maxWidth: 1100, margin: "0 auto", padding: "0 12px" }}>
        {showForm && (
          <div style={{ background: "linear-gradient(135deg, #0e1e38, #111e35)", border: "1px solid rgba(100,160,255,0.2)", borderRadius: 14, padding: "20px", marginTop: 20, marginBottom: 8, boxShadow: "0 8px 40px rgba(0,40,120,0.3)" }}>
            <div style={{ fontSize: 14, fontWeight: 700, color: "#7ab8ff", marginBottom: 16 }}>{editIndex !== null ? "✏️ עריכת טיסה" : "✈ הוספת טיסה חדשה"}</div>
            <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(150px, 1fr))", gap: 12 }}>
              <Field label="📅 תאריך">
                <input type="date" value={form.date} onChange={e => handleChange("date", e.target.value)} style={inputStyle}/>
              </Field>
              <Field label="🕐 שעת המראה">
                <div style={{ display: "flex", gap: 6, alignItems: "center" }}>
                  <select value={form.departureTime ? form.departureTime.split(":")[0] : ""}
                    onChange={e => {
                      const mins = form.departureTime ? form.departureTime.split(":")[1] : "00";
                      handleChange("departureTime", e.target.value + ":" + (mins || "00"));
                    }}
                    style={{ ...inputStyle, width: "50%" }}>
                    <option value="">שעה</option>
                    {Array.from({length: 24}, (_, i) => String(i).padStart(2,"0")).map(h =>
                      <option key={h} value={h}>{h}</option>
                    )}
                  </select>
                  <span style={{ color: "#7ab8ff", fontWeight: 700, fontSize: 18 }}>:</span>
                  <select value={form.departureTime ? form.departureTime.split(":")[1] : ""}
                    onChange={e => {
                      const hrs = form.departureTime ? form.departureTime.split(":")[0] : "00";
                      handleChange("departureTime", (hrs || "00") + ":" + e.target.value);
                    }}
                    style={{ ...inputStyle, width: "50%" }}>
                    <option value="">דקות</option>
                    {["00","05","10","15","20","25","30","35","40","45","50","55"].map(m =>
                      <option key={m} value={m}>{m}</option>
                    )}
                  </select>
                </div>
              </Field>
              <Field label="🛫 מקום המראה">
                <select value={form.origin} onChange={e => handleChange("origin", e.target.value)} style={inputStyle}>
                  {AIRPORTS.map(a => <option key={a} value={a}>{a}</option>)}
                </select>
                {form.origin === "אחר - הזן ידנית" && (
                  <input type="text" placeholder="הזן מקום" value={form.originCustom} onChange={e => handleChange("originCustom", e.target.value)} style={{ ...inputStyle, marginTop: 8 }}/>
                )}
              </Field>
              <Field label="⏱ זמן טיסה">
                <div style={{ display: "flex", gap: 5, flexWrap: "wrap" }}>
                  {DURATION_OPTIONS.map(d => (
                    <button key={d} onClick={() => handleChange("duration", String(d))} style={{ padding: "6px 10px", borderRadius: 7, border: "1px solid", cursor: "pointer", fontWeight: 600, fontSize: 12, background: form.duration === String(d) ? "linear-gradient(135deg,#1a6aff,#0a3aaa)" : "rgba(255,255,255,0.05)", borderColor: form.duration === String(d) ? "#1a6aff" : "rgba(255,255,255,0.15)", color: form.duration === String(d) ? "#fff" : "#aac8f0" }}>{d}′</button>
                  ))}
                  <button onClick={() => handleChange("duration", "custom")} style={{ padding: "6px 10px", borderRadius: 7, border: "1px solid", cursor: "pointer", fontWeight: 600, fontSize: 12, background: form.duration === "custom" ? "linear-gradient(135deg,#8a4aff,#5a2aaa)" : "rgba(255,255,255,0.05)", borderColor: form.duration === "custom" ? "#8a4aff" : "rgba(255,255,255,0.15)", color: form.duration === "custom" ? "#fff" : "#aac8f0" }}>ידני</button>
                </div>
                {form.duration === "custom" && (
                  <input type="number" min="1" max="600" placeholder="דקות" value={form.durationCustom} onChange={e => handleChange("durationCustom", e.target.value)} style={{ ...inputStyle, marginTop: 8, width: 90 }}/>
                )}
              </Field>
              <Field label="✈ סוג טיסה">
                <div style={{ display: "flex", gap: 6 }}>
                  {["פרטית", "מסחרית", "אחרת"].map(t => (
                    <button key={t} onClick={() => handleChange("flightType", t)} style={{ padding: "6px 10px", borderRadius: 7, border: "1px solid", cursor: "pointer", fontWeight: 600, fontSize: 12, background: form.flightType === t ? "linear-gradient(135deg,#ff8a1a,#cc5a00)" : "rgba(255,255,255,0.05)", borderColor: form.flightType === t ? "#ff8a1a" : "rgba(255,255,255,0.15)", color: form.flightType === t ? "#fff" : "#aac8f0" }}>{t}</button>
                  ))}
                </div>
              </Field>
              <div style={{ gridColumn: "1 / -1" }}>
                <Field label="📝 הערות">
                  <textarea value={form.notes} onChange={e => handleChange("notes", e.target.value)} placeholder="הערות נוספות..." rows={2} style={{ ...inputStyle, resize: "vertical", minHeight: 48 }}/>
                </Field>
              </div>
            </div>
            <div style={{ marginTop: 16, display: "flex", gap: 10, justifyContent: "flex-end" }}>
              <button onClick={handleSubmit} disabled={saving} style={{ background: saving ? "rgba(30,100,255,0.4)" : "linear-gradient(135deg,#1a6aff,#0a3aaa)", color: "#fff", border: "none", borderRadius: 9, padding: "9px 22px", cursor: saving ? "not-allowed" : "pointer", fontWeight: 700, fontSize: 14 }}>
                {saving ? "⏳ שומר..." : (editIndex !== null ? "💾 עדכן" : "✅ שמור לדרייב")}
              </button>
              <button onClick={() => { setShowForm(false); setEditIndex(null); setForm(emptyFlight()); }} style={{ background: "transparent", color: "#7ab8ff", border: "1px solid rgba(100,160,255,0.3)", borderRadius: 9, padding: "9px 20px", cursor: "pointer", fontWeight: 600, fontSize: 13 }}>ביטול</button>
            </div>
          </div>
        )}

        {loading && (
          <div style={{ textAlign: "center", padding: "60px 20px", color: "#4a7aaa" }}>
            <div style={{ fontSize: 36, marginBottom: 12, animation: "spin 1.5s linear infinite", display: "inline-block" }}>✈</div>
            <div>טוען נתונים מ-Google Drive...</div>
          </div>
        )}

        {!loading && (
          <div style={{ marginTop: showForm ? 16 : 20 }}>
            {flights.length === 0 ? (
              <div style={{ textAlign: "center", padding: "80px 20px", color: "#4a7aaa", fontSize: 15 }}>
                <div style={{ fontSize: 52, marginBottom: 16, opacity: 0.3 }}>✈</div>
                <div>אין טיסות עדיין. הוסף את הטיסה הראשונה!</div>
              </div>
            ) : (
              <div style={{ background: "rgba(10,20,40,0.6)", border: "1px solid rgba(100,160,255,0.15)", borderRadius: 14, overflow: "hidden" }}>
                <div style={{ overflowX: "auto" }}>
                  <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 13 }}>
                    <thead>
                      <tr style={{ background: "rgba(20,50,100,0.5)", borderBottom: "1px solid rgba(100,160,255,0.2)" }}>
                        {[
                          { key: "תאריך", label: "📅 תאריך" },
                          { key: "מקום המראה", label: "🛫 המראה" },
                          { key: "שעת המראה", label: "🕐 שעה" },
                          { key: "זמן טיסה", label: "⏱ זמן" },
                          { key: "סוג טיסה", label: "✈ סוג" },
                          { key: "הערות", label: "📝 הערות" },
                        ].map(col => (
                          <th key={col.key} onClick={() => handleSort(col.key)} style={{ padding: "11px 10px", textAlign: "right", cursor: "pointer", color: sortField === col.key ? "#7ab8ff" : "#5a88bb", fontWeight: 700, fontSize: 12, whiteSpace: "nowrap", userSelect: "none" }}>
                            {col.label} <SortIcon field={col.key}/>
                          </th>
                        ))}
                        <th style={{ padding: "11px 10px", color: "#5a88bb", fontWeight: 700, fontSize: 12 }}>פעולות</th>
                      </tr>
                    </thead>
                    <tbody>
                      {sorted.map((f, i) => {
                        const origIdx = flights.indexOf(f);
                        return (
                          <tr key={i} style={{ borderBottom: "1px solid rgba(100,160,255,0.08)", background: i % 2 === 0 ? "transparent" : "rgba(20,40,80,0.2)" }}>
                            <td style={tdStyle}>{formatDate(f["תאריך"])}</td>
                            <td style={tdStyle}><span style={{ color: "#90c8ff" }}>{f["מקום המראה"]}</span></td>
                            <td style={tdStyle}><span style={{ fontFamily: "monospace", color: "#aad4ff" }}>{formatTime(f["שעת המראה"])}</span></td>
                            <td style={tdStyle}><span style={{ background: "rgba(30,100,255,0.2)", color: "#7ab8ff", borderRadius: 6, padding: "2px 8px", fontSize: 12, fontWeight: 600 }}>{f["זמן טיסה"]}</span></td>
                            <td style={tdStyle}><span style={{ background: f["סוג טיסה"] === "פרטית" ? "rgba(255,140,30,0.18)" : "rgba(80,200,120,0.15)", color: f["סוג טיסה"] === "פרטית" ? "#ffaa60" : "#60dd90", borderRadius: 6, padding: "2px 8px", fontSize: 11, fontWeight: 600 }}>{f["סוג טיסה"]}</span></td>
                            <td style={{ ...tdStyle, maxWidth: 140, color: "#8aabcc", fontSize: 12 }}><span style={{ display: "block", overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{f["הערות"] || "—"}</span></td>
                            <td style={{ ...tdStyle, whiteSpace: "nowrap" }}>
                              <button onClick={() => handleEdit(f, origIdx)} style={{ background: "rgba(100,160,255,0.12)", color: "#7ab8ff", border: "1px solid rgba(100,160,255,0.25)", borderRadius: 6, padding: "4px 9px", cursor: "pointer", fontSize: 12, marginLeft: 4 }}>✏️</button>
                              <button onClick={() => setDeleteConfirm(origIdx)} style={{ background: "rgba(255,80,80,0.1)", color: "#ff8080", border: "1px solid rgba(255,100,100,0.2)", borderRadius: 6, padding: "4px 9px", cursor: "pointer", fontSize: 12 }}>🗑</button>
                            </td>
                          </tr>
                        );
                      })}
                    </tbody>
                  </table>
                </div>
                <div style={{ padding: "8px 14px", borderTop: "1px solid rgba(100,160,255,0.1)", color: "#4a7aaa", fontSize: 11, textAlign: "left" }}>סה"כ: {flights.length} טיסות</div>
              </div>
            )}
          </div>
        )}
      </div>

      {deleteConfirm !== null && (
        <div style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.7)", display: "flex", alignItems: "center", justifyContent: "center", zIndex: 100 }} onClick={() => setDeleteConfirm(null)}>
          <div onClick={e => e.stopPropagation()} style={{ background: "#0e1e38", border: "1px solid rgba(255,80,80,0.3)", borderRadius: 16, padding: "28px 32px", maxWidth: 320, textAlign: "center" }}>
            <div style={{ fontSize: 32, marginBottom: 12 }}>🗑</div>
            <div style={{ fontSize: 16, fontWeight: 600, marginBottom: 6 }}>מחיקת טיסה</div>
            <div style={{ color: "#7a9abb", marginBottom: 22, fontSize: 13 }}>הטיסה תימחק גם מה-Google Sheet</div>
            <div style={{ display: "flex", gap: 10, justifyContent: "center" }}>
              <button onClick={() => setDeleteConfirm(null)} style={{ padding: "9px 20px", borderRadius: 9, cursor: "pointer", background: "transparent", color: "#7ab8ff", border: "1px solid rgba(100,160,255,0.3)", fontWeight: 600 }}>ביטול</button>
              <button onClick={() => handleDelete(deleteConfirm)} disabled={saving} style={{ padding: "9px 20px", borderRadius: 9, cursor: "pointer", background: "linear-gradient(135deg,#cc2222,#881111)", color: "#fff", border: "none", fontWeight: 700 }}>{saving ? "מוחק..." : "מחק"}</button>
            </div>
          </div>
        </div>
      )}

      {toast && (
        <div style={{ position: "fixed", bottom: 28, left: "50%", transform: "translateX(-50%)", background: toast.type === "error" ? "linear-gradient(135deg,#cc2222,#881111)" : "linear-gradient(135deg,#1a7a3a,#0e5a28)", color: "#fff", borderRadius: 12, padding: "12px 24px", fontWeight: 600, fontSize: 14, zIndex: 200, boxShadow: "0 8px 32px rgba(0,0,0,0.4)", animation: "fadeInUp 0.3s ease", whiteSpace: "nowrap" }}>{toast.msg}</div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);

if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => navigator.serviceWorker.register('/sw.js').catch(()=>{}));
}
</script>
</body>
</html>
